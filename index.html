<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EPF - Express Yourself System HD</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root {
        --sky-blue: #00d2ff;
        --crystal-blue: #3a7bd5;
        --deep-ocean: #001f3f;
        --bright-text: #ffffff;
        --neon-cyan: #00ffff;
        --glass-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
        --bg-gradient: radial-gradient(circle at center, #3a7bd5 0%, #001f3f 100%);
    }
    
    body {
        font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
        background: var(--bg-gradient);
        background-attachment: fixed;
        color: var(--bright-text);
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-image: 
            linear-gradient(rgba(0, 31, 63, 0.8), rgba(0, 31, 63, 0.8)),
            url('https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&q=80&w=1000');
        background-size: cover;
        background-position: center;
        padding-bottom: 100px;
    }

    body::before {
        content: "EPF";
        position: fixed;
        bottom: 10%;
        right: 5%;
        font-size: 10rem;
        font-weight: 900;
        opacity: 0.03;
        color: white;
        z-index: -1;
        transform: rotate(-15deg);
        pointer-events: none;
    }

    .header-container {
        text-align: center;
        margin-bottom: 40px;
        perspective: 1000px;
    }

    h1 {
        font-size: clamp(2.5rem, 10vw, 4.5rem);
        font-weight: 900;
        margin: 0;
        text-transform: uppercase;
        color: var(--bright-text);
        text-shadow: 0 10px 20px rgba(0, 255, 255, 0.4), 0 0 100px rgba(255,255,255,0.2);
        letter-spacing: -2px;
        transform: translateZ(50px);
    }

    h2 {
        font-size: 1.2rem;
        letter-spacing: 6px;
        color: var(--neon-cyan);
        margin: 0;
        text-transform: uppercase;
        font-weight: 800;
        opacity: 0.9;
    }

    h3 {
        font-size: 1.2rem;
        color: var(--bright-text);
        text-align: center;
        margin: 20px 0;
        letter-spacing: 2px;
    }

    .container {
        width: 100%;
        max-width: 650px;
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding: 35px;
        border-radius: 30px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        margin-bottom: 30px;
        box-sizing: border-box;
    }

    label {
        display: block;
        font-size: 0.8rem;
        color: var(--neon-cyan);
        margin: 20px 0 8px;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 1.5px;
    }

    label span {
        display: block;
        font-size: 0.6rem;
        color: rgba(255, 255, 255, 0.6);
        text-transform: none;
        letter-spacing: 0.5px;
        margin-top: 2px;
    }

    input {
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.05);
        color: white;
        box-sizing: border-box;
        font-size: 1.1rem;
        transition: 0.3s;
    }

    input:focus {
        outline: none;
        border-color: var(--neon-cyan);
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-top: 15px;
    }

    .box {
        background: rgba(0, 0, 0, 0.2);
        padding: 15px;
        border-radius: 18px;
    }

    .submit {
        background: linear-gradient(135deg, var(--sky-blue) 0%, var(--crystal-blue) 100%);
        color: var(--deep-ocean);
        font-weight: 900;
        font-size: 1.1rem;
        padding: 20px;
        border-radius: 15px;
        border: none;
        cursor: pointer;
        text-transform: uppercase;
        width: 100%;
        margin-top: 25px;
        transition: 0.3s;
    }

    .submit:hover {
        transform: translateY(-3px);
        filter: brightness(1.2);
    }

    .logout {
        background: rgba(255, 50, 50, 0.2);
        color: #ff6b6b;
        border: 1px solid rgba(255, 50, 50, 0.3);
        padding: 8px 15px;
        font-weight: 800;
        float: right;
        border-radius: 10px;
        cursor: pointer;
    }

    #modalOverlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(12px);
    }
    .modal-box {
        background: var(--glass-bg);
        border: 1px solid var(--neon-cyan);
        padding: 30px;
        border-radius: 20px;
        width: 95%;
        max-width: 800px;
        text-align: center;
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        max-height: 90vh;
        overflow-y: auto;
    }
    
    .report-flex-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        align-items: flex-start;
    }

    .report-stats { flex: 1; min-width: 280px; }
    .report-chart { flex: 1; min-width: 280px; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }

    .modal-box p { font-weight: 800; font-size: 1.1rem; margin-bottom: 20px; color: white; }
    .modal-btn {
        background: var(--neon-cyan);
        color: var(--deep-ocean);
        border: none;
        padding: 12px 30px;
        border-radius: 10px;
        font-weight: 900;
        text-transform: uppercase;
        cursor: pointer;
        margin: 20px 5px 0;
    }
    .modal-btn.cancel { background: #ff6b6b; color: white; }

    .report-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        text-align: left;
    }
    .report-item {
        background: rgba(255,255,255,0.05);
        padding: 10px;
        border-radius: 8px;
        border: 1px solid rgba(0,255,255,0.1);
    }
    .report-label { color: var(--neon-cyan); font-size: 0.65rem; font-weight: 900; text-transform: uppercase; display: block; }
    .report-val { color: white; font-size: 1.1rem; font-weight: 900; }

    table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
    td { 
        background: rgba(255, 255, 255, 0.05); 
        padding: 15px; 
        text-align: center; 
    }
    td:first-child { border-radius: 15px 0 0 15px; color: var(--neon-cyan); font-weight: 900; }
    td:last-child { border-radius: 0 15px 15px 0; font-size: 1.2rem; font-weight: 900; color: var(--sky-blue); }
    
    .first td { 
        background: rgba(0, 255, 255, 0.1);
        border-top: 1px solid var(--neon-cyan);
        border-bottom: 1px solid var(--neon-cyan);
    }

    .clickable-row { cursor: pointer; transition: 0.2s; }
    .clickable-row:hover { filter: brightness(1.4); transform: scale(1.02); }

    footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 15px 0;
        background: rgba(0, 31, 63, 0.8);
        backdrop-filter: blur(10px);
        border-top: 1px solid var(--glass-border);
        text-align: center;
        z-index: 100;
    }

    .copy-text { font-weight: 800; letter-spacing: 2px; color: var(--bright-text); font-size: 0.9rem; text-transform: uppercase; }
    .designer-text { font-size: 0.7rem; color: var(--neon-cyan); opacity: 0.7; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal-box">
        <div id="modalContent">
            <p id="modalMsg"></p>
        </div>
        <button class="modal-btn" id="modalOk">OK</button>
        <button class="modal-btn cancel" id="modalCancel" style="display:none;">CANCEL</button>
    </div>
</div>

<div class="header-container">
    <h2>Eternal Praise Family</h2>
    <h1>Express Yourself</h1>
</div>

<div id="app" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
    <div id="loginSection" class="container">
        <h3>SYSTEM ACCESS</h3>
        <label>Identify Yourself</label>
        <input id="loginName" placeholder="Enter Name">
        <label>Passcode</label>
        <input type="password" id="loginPass" placeholder="••••">
        <button id="loginBtn" class="submit">Authorize</button>
        <div id="loginMsg" style="color: #ff6b6b; text-align: center; margin-top: 15px; font-weight: bold;"></div>
    </div>

    <div id="scoreForm" class="container" style="display:none;">
        <button class="logout" id="logoutBtn">EXIT</button>
        <h3>JUDGE PANEL</h3>
        <label>Active Judge</label>
        <input id="judge" readonly style="background: transparent; border: none; color: var(--neon-cyan); font-weight: 900; font-size: 1.5rem; padding-left: 0;">
        <label>Contestant Name</label>
        <input id="nameInput" placeholder="Type name here..." oninput="this.value = this.value.toUpperCase().replace(/[^A-Z\s]/g, '')">
        <div class="grid">
            <div class="box"><label>Pitch (20)<span>Voice Control & Range</span></label><input type="number" id="pitch" placeholder="1-20" oninput="v(this, 20)"></div>
            <div class="box"><label>Diction (15)<span>Lyrics & Clarity</span></label><input type="number" id="diction" placeholder="1-15" oninput="v(this, 15)"></div>
            <div class="box"><label>Rhythm (15)<span>Timing & Pace</span></label><input type="number" id="rhythm" placeholder="1-15" oninput="v(this, 15)"></div>
            <div class="box"><label>Mic (10)<span>Technique & Handling</span></label><input type="number" id="mic" placeholder="1-10" oninput="v(this, 10)"></div>
            <div class="box"><label>Stage (15)<span>Confidence & Movement</span></label><input type="number" id="stage" placeholder="1-15" oninput="v(this, 15)"></div>
            <div class="box"><label>Delivery (10)<span>Expression & Flow</span></label><input type="number" id="delivery" placeholder="1-10" oninput="v(this, 10)"></div>
            <div class="box"><label>Creative (10)<span>Style & Uniqueness</span></label><input type="number" id="creativity" placeholder="1-10" oninput="v(this, 10)"></div>
            <div class="box"><label>Impact (5)<span>Overall Impression</span></label><input type="number" id="impact" placeholder="1-5" oninput="v(this, 5)"></div>
        </div>
        <button class="submit" id="submitBtn">Confirm Score</button>
        <div id="status" style="text-align: center; color: var(--neon-cyan); margin-top: 15px; font-weight: 800;"></div>
    </div>

    <div class="container">
        <h3 style="color: var(--neon-cyan);">🏆 LIVE STANDINGS</h3>
        <div style="font-size: 0.6rem; color: white; text-align: center; margin-bottom: 10px; opacity: 0.6;">TAP NAME FOR PERFORMANCE REPORT</div>
        <table>
            <thead>
                <tr style="color: var(--sky-blue); font-size: 0.7rem; letter-spacing: 2px;">
                    <th>POS</th><th>CONTESTANT</th><th>SCORE</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>
    </div>
</div>

<footer>
    <div class="copy-text">© ETERNAL PRAISE FAMILY</div>
    <div class="designer-text">DESIGNED BY KOOLA</div>
</footer>

<script>
const APP_URL = "https://script.google.com/macros/s/AKfycbw8kjYEOZz1sdtCzQgSrJIZpjRxNuTHDPns1QZfRiA3IyDKOG6vES4lEpWX9w_Ffw/exec";
let chartInstance = null;

function showModal(msg, isConfirm = false, customHtml = "", chartData = null) {
    return new Promise((resolve) => {
        if(customHtml) {
            modalContent.innerHTML = customHtml;
        } else {
            modalContent.innerHTML = `<p id="modalMsg">${msg}</p>`;
        }
        
        modalOverlay.style.display = "flex";
        modalCancel.style.display = isConfirm ? "inline-block" : "none";
        
        if(chartData) {
            const ctx = document.getElementById('reportChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            
            const grad = ctx.createLinearGradient(0, 0, 400, 0);
            grad.addColorStop(0, 'rgba(0, 210, 255, 0.8)');
            grad.addColorStop(0.5, 'rgba(0, 255, 255, 0.4)');
            grad.addColorStop(1, 'rgba(58, 123, 213, 0.9)');
            
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(chartData),
                    datasets: [{
                        data: Object.values(chartData),
                        backgroundColor: grad,
                        borderColor: '#ffffff',
                        borderWidth: 2,
                        borderRadius: 10,
                        borderSkipped: false,
                        hoverBackgroundColor: '#00ffff',
                        barPercentage: 0.7
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { 
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#ffffff', font: { size: 10, weight: 'bold' } }
                        },
                        y: { 
                            grid: { display: false },
                            ticks: { color: '#00ffff', font: { weight: '900', size: 11 } }
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0, 31, 63, 0.9)',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            borderColor: '#00ffff',
                            borderWidth: 1
                        }
                    },
                    animation: {
                        duration: 1500,
                        easing: 'easeOutElastic'
                    }
                }
            });
        }

        modalOk.onclick = () => { modalOverlay.style.display = "none"; resolve(true); };
        modalCancel.onclick = () => { modalOverlay.style.display = "none"; resolve(false); };
    });
}

document.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener('keydown', (e) => {
        if (['e', 'E', '+', '-'].includes(e.key)) e.preventDefault();
    });
});

async function v(input, max) {
    let val = input.value;
    if (val === "0") {
        await showModal("Score cannot be zero!");
        input.value = "";
        return;
    }
    if (parseFloat(val) > max) input.value = max;
}

function showPanel(user){
    document.getElementById("judge").value = user.name.toUpperCase();
    document.getElementById("scoreForm").style.display="block";
    document.getElementById("loginSection").style.display="none";
    loadBoard();
}

(function(){
    const user = sessionStorage.getItem("user");
    if(user) showPanel(JSON.parse(user));
})();

loginBtn.onclick = async () => {
    const name = loginName.value.trim().toUpperCase();
    const password = loginPass.value.trim();
    if(!name || !password) return;
    loginMsg.innerText = "AUTHENTICATING...";
    const res = await fetch(APP_URL, { method:"POST", body: new URLSearchParams({action:"login", name, password}) });
    const user = await res.json();
    if(user.success) { sessionStorage.setItem("user", JSON.stringify(user)); showPanel(user); }
    else loginMsg.innerText = user.message;
};

submitBtn.onclick = async () => {
    const user = JSON.parse(sessionStorage.getItem("user"));
    
    // SMART MERGE: Get name, convert to Upper, and only take the FIRST word
    let rawName = nameInput.value.trim().toUpperCase();
    const contestant = rawName.split(" ")[0]; 
    
    if(!contestant) return showModal("Please enter the Contestant Name!");

    const scoreFields = [
        { id: "pitch", name: "Pitch" }, { id: "diction", name: "Diction" },
        { id: "rhythm", name: "Rhythm" }, { id: "mic", name: "Mic" },
        { id: "stage", name: "Stage" }, { id: "delivery", name: "Delivery" },
        { id: "creativity", name: "Creative" }, { id: "impact", name: "Impact" }
    ];

    for (let field of scoreFields) {
        const val = document.getElementById(field.id).value;
        if (val === "" || parseFloat(val) <= 0) {
            await showModal(`Form Incomplete: "${field.name}" is missing!`);
            document.getElementById(field.id).focus();
            return;
        }
    }

    const go = await showModal(`Confirm submission for ${contestant}?`, true);
    if(!go) return;

    status.innerText = "TRANSMITTING...";
    const data = {
        contestant, 
        judge: user.name, 
        role: user.role,
        pitch: +pitch.value, 
        tone: +diction.value, 
        rhythm: +rhythm.value, 
        mic: +mic.value,
        stage: +stage.value, 
        communication: +delivery.value, 
        creativity: +creativity.value, 
        impact: +impact.value
    };

    const res = await fetch(APP_URL, { method:"POST", body: new URLSearchParams(data) });
    const result = await res.json();
    if(result.success) { 
        await showModal("SUCCESS ✔ DATA SAVED"); 
        location.reload(); 
    } else {
        await showModal(result.error);
    }
};

async function fetchReport(name) {
    status.innerText = `GENERATING REPORT...`;
    try {
        const res = await fetch(APP_URL, { 
            method: "POST", 
            body: new URLSearchParams({ action: "report", contestant: name }) 
        });
        const data = await res.json();
        if(data.success) {
            const html = `
                <h3 style="color:var(--neon-cyan); margin-top:0;">PERFORMANCE CARD</h3>
                <p style="font-size:1.5rem; margin-bottom:5px;">${data.name}</p>
                <div style="font-size:0.7rem; color:var(--sky-blue); margin-bottom:20px; font-weight:800;">AVERAGES FROM ${data.judgeCount} JUDGES</div>
                
                <div class="report-flex-container">
                    <div class="report-stats">
                        <div class="report-grid">
                            ${Object.entries(data.averages).map(([label, val]) => `
                                <div class="report-item">
                                    <span class="report-label">${label}</span>
                                    <span class="report-val">${val}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="report-chart" style="height: 300px;">
                        <canvas id="reportChart"></canvas>
                    </div>
                </div>
            `;
            await showModal("", false, html, data.averages);
        } else {
            await showModal(data.message);
        }
    } catch(e) { await showModal("Network Error."); }
    status.innerText = "";
}

async function loadBoard(){
    try {
        const res = await fetch(APP_URL+"?p=board");
        const data = await res.json();
        boardBody.innerHTML = data.map((d,i)=> `
            <tr class="${i==0?'first':''} clickable-row" onclick="fetchReport('${d.name}')">
                <td>#${i+1}</td>
                <td style="text-align: left;">
                    <div style="font-weight:900; font-size:1.1rem; color:white;">${d.name}</div>
                    <div style="font-size:0.6rem; color:var(--neon-cyan); opacity:0.8; font-weight:bold;">VOTED BY: ${d.judges.join(" | ")}</div>
                </td>
                <td>${d.avg.toFixed(2)}</td>
            </tr>`).join('');
    } catch(e) { console.log("Updating..."); }
}

logoutBtn.onclick = () => { sessionStorage.clear(); location.reload(); };
setInterval(loadBoard, 15000);
loadBoard();
</script>
</body>
</html>
