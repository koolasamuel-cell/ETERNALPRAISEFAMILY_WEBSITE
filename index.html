<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Express Yourself System</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f0f0f,#1c1c1c);
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    color:gold;
}

/* SECTIONS */
#loginSection, #scoreForm{
    max-width:600px;
    margin:0 auto 20px;
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:12px;
}

label{ display:block; color:#ccc; margin:5px 0 3px; }

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    outline:none;
    box-sizing: border-box;
}

/* GRID FOR SCORES */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-top:15px;
}

.box{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:10px;
}

button{
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition: 0.3s;
}

.submit{background:gold;color:black; width: 100%; font-size: 1.1em;}
.submit:hover{background: #ffd700; transform: scale(1.02);}
.reset{background:#444;color:white; width: 100%;}
.logout{background:#e74c3c;color:white; float:right; margin-top:0; padding: 5px 15px;}

.status{
    text-align:center;
    margin-top:10px;
    color:lightgreen;
    font-weight:bold;
}

/* TABLES */
.board, .history-section{
    margin-top:40px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    background: rgba(0,0,0,0.3);
}

th,td{
    padding:12px;
    border:1px solid #333;
    text-align:center;
}

th{
    background:gold;
    color:black;
}

/* JUDGE LIST STYLING (The footer requirement) */
.judge-row-footer {
    font-size: 0.75em;
    color: #ffd700;
    margin-top: 8px;
    display: block;
    text-align: left;
    border-top: 1px solid #444;
    padding-top: 4px;
}

/* TOP 3 COLORS */
.first{background:rgba(31, 170, 89, 0.3); color:white;}
.second{background:rgba(241, 196, 15, 0.3); color:white;}
.third{background:rgba(231, 76, 60, 0.3); color:white;}
</style>
</head>

<body>

<h1>🎤 Express Yourself System</h1>

<div id="app">
  <div id="loginSection">
    <h2>🔑 Judge Login</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
      <div>
        <label>Name</label>
        <input id="loginName" placeholder="Your name">
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Your password">
      </div>
    </div>
    <button id="loginBtn" style="width: 100%;">Login as Judge</button>
    <div id="loginMsg"></div>
  </div>

  <div id="scoreForm" style="display:none;">
    <button class="logout" id="logoutBtn">Logout</button>
    <h2 style="color:gold;">Judge Panel</h2>
   ```html
<label>Judge Name</label>
<input id="judge" readonly style="background:#333; color:gold;">

<label>Contestant Name</label>
<input id="name" placeholder="Name of contestant">
```

   
    <div class="grid">
  <div class="box">
    <label>Pitch (20)</label>
    <input type="number" id="pitch" placeholder="Tone & Key accuracy">
  </div>

  <div class="box">
    <label>Diction (15)</label>
    <input type="number" id="diction" placeholder="Lyrics clarity & pronunciation">
  </div>

  <div class="box">
    <label>Rhythm (15)</label>
    <input type="number" id="rhythm" placeholder="Timing & flow consistency">
  </div>

  <div class="box">
    <label>Technique (10)</label>
    <input type="number" id="mic" placeholder="Mic control & voice handling">
  </div>

  <div class="box">
    <label>Performance (15)</label>
    <input type="number" id="performance" placeholder="Stage presence, confidence & presentation">
  </div>

  <div class="box">
    <label>Delivery (10)</label>
    <input type="number" id="delivery" placeholder="Expression & communication">
  </div>

  <div class="box">
    <label>Creativity (10)</label>
    <input type="number" id="creativity" placeholder="Originality & style">
  </div>

  <div class="box">
    <label>Impact (5)</label>
    <input type="number" id="impact" placeholder="Audience connection & effect">
  </div>
</div>

    <button class="submit" id="submitBtn">Submit Score</button>
    <button class="reset" id="resetBtn">Clear Form</button>
    <div class="status" id="status"></div>

    <div class="history-section">
        <h3 style="color:gold; text-align:center;">📋 Your Recently Voted</h3>
        <table style="font-size: 0.9em;">
            <thead>
                <tr>
                    <th>Contestant</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="judgeHistory"></tbody>
        </table>
    </div>
  </div>

  <div class="board">
    <h2 style="color:gold;text-align:center;">🏆 Live Leaderboard</h2>
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Contestant Info</th>
          <th>Average Score</th>
        </tr>
      </thead>
      <tbody id="board"></tbody>
    </table>
  </div>
</div>

<script>
const APP_URL = "https://script.google.com/macros/s/AKfycbzQ41hVIHIYzzU9-h88izrPt5s92RZDjl4XOPEtvFWhEWdtihzBcrh0JnyPsKmaq47_/exec";

function showLoginOnly() {
    document.getElementById("scoreForm").style.display = "none";
    document.getElementById("loginSection").style.display = "block";
}

function showJudgePanel(name) {
    document.getElementById("judge").value = name;
    document.getElementById("scoreForm").style.display = "block";
    document.getElementById("loginSection").style.display = "none";
    loadBoard();
}

(function(){
    const userJson = sessionStorage.getItem("user");
    if (userJson) {
        const user = JSON.parse(userJson);
        showJudgePanel(user.name);
    } else {
        showLoginOnly();
    }
})();

document.getElementById("loginBtn").onclick = async function(){
    const name = document.getElementById("loginName").value.trim();
    const password = document.getElementById("loginPass").value.trim();
    const msg = document.getElementById("loginMsg");
    if (!name || !password) { msg.innerText = "Enter credentials."; return; }
    msg.innerText = "Logging in...";
    try {
        const res = await fetch(APP_URL, {
            method: "POST",
            body: new URLSearchParams({ action: "login", name, password }),
        });
        const user = await res.json();
        if (user.success) {
            sessionStorage.setItem("user", JSON.stringify(user));
            showJudgePanel(user.name);
        } else { msg.innerText = user.message; }
    } catch (err) { msg.innerText = "Network error."; }
};

document.getElementById("logoutBtn").onclick = function() {
    sessionStorage.clear();
    showLoginOnly();
};

async function submitScore(){
    const user = JSON.parse(sessionStorage.getItem("user"));
    const contestant = document.getElementById("name").value.trim();

    if (!contestant) { alert("Please enter Contestant Name"); return; }

    // REQUIREMENT: PROMPT CONFIRMATION
    const confirmVote = confirm(`Are you sure you want to submit the score for ${contestant}? This cannot be changed.`);
    if(!confirmVote) return;

    const data = {
        contestant: contestant,
        judge: user.name,
        pitch: document.getElementById("pitch").value || 0,
        tone: document.getElementById("tone").value || 0,
        rhythm: document.getElementById("rhythm").value || 0,
        mic: document.getElementById("mic").value || 0,
        stage: document.getElementById("stage").value || 0,
        communication: document.getElementById("comm").value || 0,
        creativity: document.getElementById("creativity").value || 0,
        impact: document.getElementById("impact").value || 0
    };

    const status = document.getElementById("status");
    status.innerText = "Checking and Saving...";

    try {
        const res = await fetch(APP_URL, {
            method: "POST",
            body: new URLSearchParams(data)
        });
        const result = await res.json();

        if (result.success) {
            alert("Score successfully recorded! Total: " + result.total);
            resetForm();
            loadBoard();
        } else {
            alert("Error: " + result.error);
            status.innerText = result.error;
        }
    } catch (err) { status.innerText = "Submission failed."; }
}

function resetForm(){
    document.getElementById("name").value = "";
    document.querySelectorAll("#scoreForm input[type='number']").forEach(i => i.value = "");
}

async function loadBoard(){
    try {
        const res = await fetch(`${APP_URL}?p=board`);
        const data = await res.json();
        const board = document.getElementById("board");
        const historyTable = document.getElementById("judgeHistory");
        const currentUser = JSON.parse(sessionStorage.getItem("user"));

        board.innerHTML = "";
        if(historyTable) historyTable.innerHTML = "";

        data.forEach((d, i) => {
            let cls = "";
            if(i==0) cls="first";
            else if(i==1) cls="second";
            else if(i==2) cls="third";

            // REQUIREMENT: DISPLAY JUDGE NAMES AT THE BOTTOM OF ROW
            const judgesString = d.judges.join(" | ");

            board.innerHTML += `
                <tr class="${cls}">
                    <td>${i+1}</td>
                    <td>
                        <div style="font-weight: bold; font-size: 1.2em;">${d.name}</div>
                        <div class="judge-row-footer">Voted by: ${judgesString}</div>
                    </td>
                    <td>${d.avg.toFixed(2)}</td>
                </tr>
            `;

            // REQUIREMENT: SHOW JUDGE THEIR OWN VOTES
            if(currentUser && d.judges.includes(currentUser.name)) {
                historyTable.innerHTML += `<tr><td>${d.name}</td><td style="color:lightgreen;">Submitted ✔</td></tr>`;
            }
        });
    } catch(err){ console.log("Refresh failed"); }
}

setInterval(loadBoard, 10000); 
loadBoard();

document.getElementById("submitBtn").onclick = submitScore;
document.getElementById("resetBtn").onclick = resetForm;
</script>

</body>
</html>
